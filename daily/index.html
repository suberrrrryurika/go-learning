<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日学习内容 - Go 语言学习</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 15px;
        }
        
        .header p {
            font-size: 16px;
            opacity: 0.95;
        }
        
        .date-selector {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .date-selector label {
            display: block;
            font-weight: bold;
            margin-bottom: 15px;
            color: #667eea;
        }
        
        .date-selector input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .date-selector button {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-right: 10px;
        }
        
        .date-selector button:hover {
            background: #5568d3;
        }
        
        .date-selector button.secondary {
            background: #6c757d;
        }
        
        .date-selector button.secondary:hover {
            background: #5a6268;
        }
        
        .content {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #f5c6cb;
            margin: 20px 0;
        }
        
        /* Markdown 样式 */
        .markdown-body h1 {
            font-size: 28px;
            color: #667eea;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #667eea;
        }
        
        .markdown-body h2 {
            font-size: 22px;
            color: #333;
            margin: 30px 0 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .markdown-body h3 {
            font-size: 18px;
            color: #667eea;
            margin: 25px 0 12px;
        }
        
        .markdown-body p {
            margin: 15px 0;
            text-align: justify;
        }
        
        .markdown-body ul, .markdown-body ol {
            margin: 15px 0;
            padding-left: 30px;
        }
        
        .markdown-body li {
            margin: 8px 0;
        }
        
        .markdown-body code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            color: #e83e8c;
        }
        
        .markdown-body pre {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            padding: 20px;
            overflow-x: auto;
            margin: 20px 0;
        }
        
        .markdown-body pre code {
            background: none;
            padding: 0;
            color: #333;
        }
        
        .markdown-body blockquote {
            border-left: 4px solid #667eea;
            padding-left: 20px;
            margin: 20px 0;
            color: #666;
            background: #f8f9fa;
            padding: 15px 20px;
            border-radius: 0 6px 6px 0;
        }
        
        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        
        .markdown-body th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
            border: 1px solid #ddd;
        }
        
        .markdown-body td {
            padding: 12px;
            border: 1px solid #ddd;
        }
        
        .markdown-body tr:nth-child(even) {
            background: #f8f9fa;
        }
        
        .markdown-body a {
            color: #667eea;
            text-decoration: none;
        }
        
        .markdown-body a:hover {
            text-decoration: underline;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
        
        .back-link:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📅 每日学习内容</h1>
            <p>选择日期查看当天的学习内容</p>
        </div>
        
        <div class="date-selector">
            <label for="dateInput">选择日期：</label>
            <input type="date" id="dateInput" />
            <div>
                <button onclick="loadToday()">📅 今日学习</button>
                <button class="secondary" onclick="loadPrevious()">← 前一天</button>
                <button class="secondary" onclick="loadNext()">后一天 →</button>
                <button class="secondary" onclick="goToLearn()">🚀 进入学习系统</button>
            </div>
        </div>
        
        <div id="content" class="content">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>正在加载学习内容...</p>
            </div>
        </div>
    </div>
    
    <script>
        const startDate = '2026-03-29';
        let currentDate = new Date().toISOString().split('T')[0];
        
        // 初始化
        function init() {
            // 设置日期选择器的最小值和最大值
            const dateInput = document.getElementById('dateInput');
            dateInput.min = startDate;
            dateInput.max = new Date().toISOString().split('T')[0];
            dateInput.value = currentDate;
            
            // 加载今日内容
            loadToday();
            
            // 日期选择器变化事件
            dateInput.addEventListener('change', (e) => {
                currentDate = e.target.value;
                loadContent(currentDate);
            });
        }
        
        // 加载今日内容
        function loadToday() {
            currentDate = new Date().toISOString().split('T')[0];
            document.getElementById('dateInput').value = currentDate;
            loadContent(currentDate);
        }
        
        // 加载前一天
        function loadPrevious() {
            const date = new Date(currentDate);
            date.setDate(date.getDate() - 1);
            currentDate = date.toISOString().split('T')[0];
            
            if (currentDate >= startDate) {
                document.getElementById('dateInput').value = currentDate;
                loadContent(currentDate);
            } else {
                alert('已经是第一天了！');
            }
        }
        
        // 加载后一天
        function loadNext() {
            const date = new Date(currentDate);
            date.setDate(date.getDate() + 1);
            currentDate = date.toISOString().split('T')[0];
            
            const today = new Date().toISOString().split('T')[0];
            if (currentDate <= today) {
                document.getElementById('dateInput').value = currentDate;
                loadContent(currentDate);
            } else {
                alert('未来的内容还没有生成哦！');
            }
        }
        
        // 跳转到学习系统
        function goToLearn() {
            // 计算是第几天
            const start = new Date(startDate);
            const current = new Date(currentDate);
            const diffDays = Math.floor((current - start) / (1000 * 60 * 60 * 24)) + 1;
            window.location.href = `learn.html?day=${diffDays}`;
        }
        
        // 加载内容
        function loadContent(date) {
            const contentDiv = document.getElementById('content');
            
            contentDiv.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>正在加载 ${date} 的学习内容...</p>
                </div>
            `;
            
            fetch(`${date}.md`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('文件不存在');
                    }
                    return response.text();
                })
                .then(markdown => {
                    const html = marked.parse(markdown);
                    contentDiv.innerHTML = `<div class="markdown-body">${html}</div>`;
                    
                    // 滚动到顶部
                    window.scrollTo(0, 0);
                })
                .catch(error => {
                    contentDiv.innerHTML = `
                        <div class="error">
                            <h3>❌ 无法加载学习内容</h3>
                            <p>日期 ${date} 的学习内容不存在。</p>
                            <p>可能原因：</p>
                            <ul>
                                <li>该日期还没有生成学习内容</li>
                                <li>文件路径不正确</li>
                            </ul>
                            <p>请尝试选择其他日期，或点击"今日学习"按钮。</p>
                        </div>
                        <a href="index.html" class="back-link">🏠 返回首页</a>
                    `;
                });
        }
        
        // 页面加载时初始化
        window.onload = init;
    </script>
</body>
</html>
